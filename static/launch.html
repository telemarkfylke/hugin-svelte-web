<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HUGIN 2.0 — LAUNCH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00e5ff;
      --red: #ff2222;
      --amber: #ff8c00;
      --gold: #ffd700;
      --bg: #030609;
    }

    body {
      background: var(--bg);
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      user-select: none;
    }

    /* ─── STARFIELD ────────────────────────────── */
    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── NEBULA ATMOSPHERE ────────────────────── */
    .nebula {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse at 15% 85%, rgba(0, 30, 80, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(40, 0, 80, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 229, 255, 0.04) 0%, transparent 70%);
    }

    /* ─── GRID ─────────────────────────────────── */
    .grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ─── SCANLINES ────────────────────────────── */
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.06) 3px,
        rgba(0, 0, 0, 0.06) 4px
      );
    }

    /* ─── HUD CORNERS ──────────────────────────── */
    .hud {
      position: fixed;
      width: 140px;
      height: 70px;
      pointer-events: none;
      z-index: 2;
    }
    .hud::before {
      content: '';
      position: absolute;
      inset: 0;
      border-color: rgba(0, 229, 255, 0.3);
      border-style: solid;
    }
    .hud-tl { top: 24px; left: 24px; }
    .hud-tl::before { border-width: 1px 0 0 1px; }
    .hud-tr { top: 24px; right: 24px; text-align: right; }
    .hud-tr::before { border-width: 1px 1px 0 0; }
    .hud-bl { bottom: 24px; left: 24px; }
    .hud-bl::before { border-width: 0 0 1px 1px; }
    .hud-br { bottom: 24px; right: 24px; text-align: right; }
    .hud-br::before { border-width: 0 1px 1px 0; }

    .hud-text {
      position: absolute;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: rgba(0, 229, 255, 0.5);
      letter-spacing: 0.18em;
      top: 7px;
      left: 10px;
      white-space: nowrap;
    }
    .hud-tr .hud-text, .hud-br .hud-text { left: auto; right: 10px; }
    .hud-bl .hud-text, .hud-br .hud-text { top: auto; bottom: 7px; }

    .hud-text-2 {
      position: absolute;
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: rgba(0, 229, 255, 0.3);
      letter-spacing: 0.12em;
      top: 22px;
      left: 10px;
      white-space: nowrap;
    }
    .hud-tr .hud-text-2, .hud-br .hud-text-2 { left: auto; right: 10px; }
    .hud-bl .hud-text-2, .hud-br .hud-text-2 { top: auto; bottom: 22px; }

    /* ─── MAIN STAGE ───────────────────────────── */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
    }

    /* ─── MISSION HEADER ───────────────────────── */
    .mission-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5em;
      color: var(--cyan);
      opacity: 0.7;
      text-transform: uppercase;
      animation: pulseOpacity 2.8s ease-in-out infinite;
    }

    .mission-title {
      font-weight: 900;
      font-size: clamp(3rem, 7vw, 5.5rem);
      letter-spacing: 0.2em;
      background: linear-gradient(180deg, #ffffff 30%, rgba(0, 229, 255, 0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      line-height: 1;
      filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.25));
    }

    .mission-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.35em;
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
    }

    .mission-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* ─── BUTTON ZONE ──────────────────────────── */
    .button-zone {
      position: relative;
      width: 340px;
      height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      pointer-events: none;
    }
    .ring-1 { width: 210px; height: 210px; border-color: rgba(255, 34, 34, 0.45); animation: ringPulse 2.5s ease-in-out infinite 0.0s; }
    .ring-2 { width: 258px; height: 258px; border-color: rgba(255, 34, 34, 0.22); animation: ringPulse 2.5s ease-in-out infinite 0.5s; }
    .ring-3 { width: 298px; height: 298px; border-color: rgba(255, 34, 34, 0.10); animation: ringPulse 2.5s ease-in-out infinite 1.0s; }
    .ring-4 { width: 340px; height: 340px; border-color: rgba(255, 34, 34, 0.05); animation: ringPulse 2.5s ease-in-out infinite 1.5s; }

    .button-zone.armed .ring-1 { border-color: rgba(255, 34, 34, 0.9); }
    .button-zone.armed .ring-2 { border-color: rgba(255, 34, 34, 0.5); }
    .button-zone.armed .ring-3 { border-color: rgba(255, 34, 34, 0.25); }
    .button-zone.armed .ring-4 { border-color: rgba(255, 34, 34, 0.12); }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.025); }
    }

    /* ─── LAUNCH BUTTON ────────────────────────── */
    #launch-btn {
      position: relative;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: none;
      cursor: not-allowed;
      z-index: 5;

      background:
        radial-gradient(circle at 38% 32%, #ff7777 0%, #dd1111 40%, #991111 70%, #550000 100%);

      box-shadow:
        0 0 0 7px #1a0000,
        0 0 0 12px #300000,
        0 0 0 16px #161616,
        0 0 0 19px #0e0e0e,
        inset 0 -10px 25px rgba(0, 0, 0, 0.65),
        inset 0 10px 18px rgba(255, 160, 160, 0.2),
        0 6px 30px rgba(0, 0, 0, 0.8);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;

      font-family: 'Orbitron', monospace;
      transition: transform 0.12s, box-shadow 0.2s, filter 0.3s;

      filter: saturate(0.4) brightness(0.55);
    }

    #launch-btn.armed {
      cursor: pointer;
      filter: none;
      animation: btnArmedPulse 1.8s ease-in-out infinite;
    }

    #launch-btn.armed:hover {
      transform: scale(1.04) translateY(-3px);
      animation: none;
      box-shadow:
        0 0 0 7px #1a0000,
        0 0 0 12px #300000,
        0 0 0 16px #161616,
        0 0 0 19px #0e0e0e,
        inset 0 -10px 25px rgba(0, 0, 0, 0.65),
        inset 0 10px 18px rgba(255, 160, 160, 0.3),
        0 15px 60px rgba(255, 0, 0, 0.7),
        0 0 90px rgba(255, 60, 0, 0.35);
    }

    #launch-btn.armed:active {
      transform: scale(0.96) translateY(3px);
      box-shadow:
        0 0 0 7px #1a0000,
        0 0 0 12px #300000,
        0 0 0 16px #161616,
        0 0 0 19px #0e0e0e,
        inset 0 -5px 12px rgba(0, 0, 0, 0.8),
        inset 0 5px 10px rgba(255, 160, 160, 0.1),
        0 3px 15px rgba(255, 0, 0, 0.3);
    }

    @keyframes btnArmedPulse {
      0%, 100% {
        box-shadow:
          0 0 0 7px #1a0000, 0 0 0 12px #300000, 0 0 0 16px #161616, 0 0 0 19px #0e0e0e,
          inset 0 -10px 25px rgba(0,0,0,0.65), inset 0 10px 18px rgba(255,160,160,0.2),
          0 0 35px rgba(255, 0, 0, 0.45);
      }
      50% {
        box-shadow:
          0 0 0 7px #1a0000, 0 0 0 12px #300000, 0 0 0 16px #161616, 0 0 0 19px #0e0e0e,
          inset 0 -10px 25px rgba(0,0,0,0.65), inset 0 10px 18px rgba(255,160,160,0.2),
          0 0 70px rgba(255, 0, 0, 0.85), 0 0 120px rgba(255, 80, 0, 0.3);
      }
    }

    .btn-label {
      font-weight: 900;
      font-size: 1.65rem;
      letter-spacing: 0.22em;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      line-height: 1;
    }

    .btn-sub {
      font-size: 0.52rem;
      letter-spacing: 0.35em;
      color: rgba(255, 210, 210, 0.65);
    }

    /* ─── SAFETY COVER ─────────────────────────── */
    #cover {
      position: absolute;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      z-index: 20;
      cursor: pointer;

      transform-origin: center 100%;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease 0.5s;

      background:
        repeating-linear-gradient(
          45deg,
          rgba(0,0,0,0.15) 0px,
          rgba(0,0,0,0.15) 8px,
          transparent 8px,
          transparent 16px
        ),
        radial-gradient(circle at 40% 32%, #ffcc44 0%, #ff9900 35%, #cc5500 65%, #882200 100%);

      box-shadow:
        0 0 0 5px #221100,
        0 0 0 8px #111,
        inset 0 8px 20px rgba(255, 220, 120, 0.3),
        inset 0 -6px 15px rgba(0, 0, 0, 0.6),
        0 -5px 25px rgba(0, 0, 0, 0.8);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    #cover:hover {
      transform: perspective(600px) rotateX(-14deg);
    }

    #cover.open {
      transform: perspective(600px) rotateX(-165deg);
      opacity: 0;
      pointer-events: none;
    }

    .cover-icon {
      font-size: 1.5rem;
      opacity: 0.75;
    }

    .cover-lift {
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      color: rgba(0, 0, 0, 0.65);
      text-shadow: 0 1px 3px rgba(255, 200, 80, 0.5);
    }

    .cover-sub {
      font-size: 0.5rem;
      letter-spacing: 0.35em;
      color: rgba(0, 0, 0, 0.5);
    }

    /* ─── STATUS BAR ───────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.45);
      transition: color 0.4s;
    }

    .status-bar.armed {
      color: rgba(255, 80, 80, 0.9);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.on {
      background: #ff2222;
      box-shadow: 0 0 8px #ff2222, 0 0 18px rgba(255, 34, 34, 0.5);
      animation: dotBlink 0.9s ease-in-out infinite;
    }

    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    /* ─── COUNTDOWN OVERLAY ────────────────────── */
    #countdown-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      background: rgba(3, 6, 9, 0.88);
      backdrop-filter: blur(3px);
    }

    #countdown-overlay.visible {
      display: flex;
    }

    .countdown-num {
      font-weight: 900;
      font-size: clamp(28vw, 40vmin, 45vmin);
      line-height: 1;
      animation: numBlast 1.0s ease-out forwards;
      will-change: transform, opacity, filter;
    }

    @keyframes numBlast {
      0%   { transform: scale(5.5); opacity: 0;   filter: blur(40px); }
      18%  { transform: scale(1.02); opacity: 1;  filter: blur(0);    }
      72%  { transform: scale(0.96); opacity: 1;  filter: blur(0);    }
      100% { transform: scale(0.68); opacity: 0;  filter: blur(12px); }
    }

    .ignition-text {
      font-weight: 900;
      font-size: clamp(8vw, 14vmin, 18vmin);
      color: #ff8800;
      letter-spacing: 0.08em;
      text-shadow:
        0 0 25px #ff8800,
        0 0 55px #ff4400,
        0 0 100px rgba(255, 50, 0, 0.5);
      animation: ignitionBlast 1.1s cubic-bezier(0.23, 1.12, 0.32, 1) forwards;
    }

    @keyframes ignitionBlast {
      0%   { transform: scale(0.25); opacity: 0; letter-spacing: 1.5em; filter: blur(10px); }
      45%  { transform: scale(1.08); opacity: 1; letter-spacing: 0.08em; filter: blur(0); }
      70%  { transform: scale(0.99); }
      100% { transform: scale(1.0);  opacity: 1; }
    }

    /* ─── FIREWORKS CANVAS ─────────────────────── */
    #fw-canvas {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      width: 100%;
      height: 100%;
    }

    #fw-canvas.visible { display: block; }

    /* ─── UTILITIES ────────────────────────────── */
    @keyframes pulseOpacity {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1;    }
    }
  </style>
</head>
<body>

  <!-- Starfield SVG -->
  <svg id="starfield" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1920 1080"></svg>

  <div class="nebula"></div>
  <div class="grid"></div>
  <div class="scanlines"></div>

  <!-- HUD corners -->
  <div class="hud hud-tl">
    <span class="hud-text">SYS.ONLINE</span>
    <span class="hud-text-2">ALL SYSTEMS GO</span>
  </div>
  <div class="hud hud-tr">
    <span class="hud-text">HUGIN 2.0</span>
    <span class="hud-text-2">BETA LAUNCH</span>
  </div>
  <div class="hud hud-bl">
    <span class="hud-text">TFK // TELEMARK</span>
    <span class="hud-text-2" id="hud-time">--:--:--</span>
  </div>
  <div class="hud hud-br">
    <span class="hud-text">STATUS</span>
    <span class="hud-text-2" id="hud-status">STANDBY</span>
  </div>

  <!-- Main stage -->
  <div class="stage">
    <div class="mission-header">
      <div class="mission-badge">⬡ &nbsp; MISSION CONTROL &nbsp; ⬡</div>
      <h1 class="mission-title">HUGIN 2.0</h1>
      <div class="mission-sub">LAUNCH SEQUENCE // READY FOR INITIALIZATION</div>
    </div>

    <div class="button-zone" id="button-zone">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>

      <button id="launch-btn" disabled aria-label="Launch Hugin 2.0">
        <span class="btn-label">LAUNCH</span>
        <span class="btn-sub">HUGIN 2.0</span>
      </button>

      <div id="cover" role="button" tabindex="0" aria-label="Lift cover to arm">
        <span class="cover-icon">⚠</span>
        <span class="cover-lift">LIFT TO ARM</span>
        <span class="cover-sub">SAFETY COVER</span>
      </div>
    </div>

    <div class="status-bar" id="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">LIFT COVER TO ARM LAUNCH SEQUENCE</span>
    </div>
  </div>

  <!-- Countdown overlay -->
  <div id="countdown-overlay">
    <div id="countdown-content"></div>
  </div>

  <!-- Fireworks canvas -->
  <canvas id="fw-canvas"></canvas>

  <script>
    const REDIRECT = 'https://hugin-beta.telemarkfylke.no';

    // ── AUDIO ENGINE (Web Audio API — no files) ─────────────────────────
    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    // Mechanical click + spring resonance when cover flips open
    function playCoverOpen() {
      try {
        const ctx = getAudio(); const t = ctx.currentTime;
        // Noise crack
        const bufLen = Math.floor(ctx.sampleRate * 0.12);
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const nd = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) nd[i] = (Math.random()*2-1) * Math.exp(-i/(bufLen*0.08));
        const ns = ctx.createBufferSource(); ns.buffer = buf;
        const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1400; bp.Q.value = 1.2;
        const ng = ctx.createGain(); ng.gain.setValueAtTime(0.55, t); ng.gain.exponentialRampToValueAtTime(0.001, t+0.12);
        ns.connect(bp); bp.connect(ng); ng.connect(ctx.destination); ns.start(t);
        // Bass thud
        const o1 = ctx.createOscillator(); o1.type = 'sine';
        o1.frequency.setValueAtTime(110, t); o1.frequency.exponentialRampToValueAtTime(30, t+0.18);
        const g1 = ctx.createGain(); g1.gain.setValueAtTime(0.7, t); g1.gain.exponentialRampToValueAtTime(0.001, t+0.18);
        o1.connect(g1); g1.connect(ctx.destination); o1.start(t); o1.stop(t+0.2);
        // Spring resonance ping
        const o2 = ctx.createOscillator(); o2.type = 'sine';
        o2.frequency.setValueAtTime(900, t+0.04); o2.frequency.exponentialRampToValueAtTime(180, t+0.28);
        const g2 = ctx.createGain(); g2.gain.setValueAtTime(0, t); g2.gain.linearRampToValueAtTime(0.14, t+0.06); g2.gain.exponentialRampToValueAtTime(0.001, t+0.28);
        o2.connect(g2); g2.connect(ctx.destination); o2.start(t); o2.stop(t+0.3);
      } catch(e) {}
    }

    // Escalating countdown beep — pitch, volume, and waveform all intensify
    function playBeep(n) {
      try {
        const ctx = getAudio(); const t = ctx.currentTime;
        const freqs = {5:420, 4:420, 3:420, 2:420, 1:420};
        const vols  = {5:0.18, 4:0.18, 3:0.18, 2:0.18, 1:0.18};
        const durs  = {5:0.18, 4:0.18, 3:0.18, 2:0.18, 1:0.18};
        const types = {5:'sine', 4:'sine', 3:'sine', 2:'sine', 1:'sine'};
        const freq = freqs[n]||440, vol = vols[n]||0.2, dur = durs[n]||0.2;
        // Main tone
        const osc = ctx.createOscillator(); osc.type = types[n]||'sine';
        osc.frequency.setValueAtTime(freq, t);
        if (n === 1) { osc.frequency.linearRampToValueAtTime(freq*1.09, t+0.14); osc.frequency.linearRampToValueAtTime(freq, t+0.32); }
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(vol, t+0.008);
        gain.gain.setValueAtTime(vol, t+dur*0.62); gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
        osc.connect(gain); gain.connect(ctx.destination); osc.start(t); osc.stop(t+dur+0.01);
        // Sub harmonic for low numbers
        //if (n <= 2) {
        //  const sub = ctx.createOscillator(); sub.type = 'triangle';
        //  sub.frequency.setValueAtTime(freq*0.5, t);
        //  const sg = ctx.createGain(); sg.gain.setValueAtTime(0, t); sg.gain.linearRampToValueAtTime(vol*0.45, t+0.01); sg.gain.exponentialRampToValueAtTime(0.001, t+dur);
        //  sub.connect(sg); sg.connect(ctx.destination); sub.start(t); sub.stop(t+dur+0.01);
       // }
        // Attack click transient
        const cLen = Math.floor(ctx.sampleRate*0.012);
        const cBuf = ctx.createBuffer(1, cLen, ctx.sampleRate);
        const cd = cBuf.getChannelData(0);
        for (let i = 0; i < cLen; i++) cd[i] = (Math.random()*2-1)*(1-i/cLen)*0.4;
        const clk = ctx.createBufferSource(); clk.buffer = cBuf;
        const cg = ctx.createGain(); cg.gain.setValueAtTime(vol*1.4, t);
        clk.connect(cg); cg.connect(ctx.destination); clk.start(t);
      } catch(e) {}
    }

    // Dramatic roar: rising sawtooth sweep + noise + bass thud
    function playIgnition() {
      try {
        const ctx = getAudio(); const t = ctx.currentTime;
        // Rising distorted sweep
        const osc1 = ctx.createOscillator(); osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(50, t); osc1.frequency.exponentialRampToValueAtTime(1000, t+1.1);
        const dist = ctx.createWaveShaper();
        const curve = new Float32Array(512); const k = 90;
        for (let i = 0; i < 512; i++) { const x = (i*2)/512-1; curve[i] = ((Math.PI+k)*x)/(Math.PI+k*Math.abs(x)); }
        dist.curve = curve;
        const g1 = ctx.createGain(); g1.gain.setValueAtTime(0, t); g1.gain.linearRampToValueAtTime(0.38, t+0.08); g1.gain.setValueAtTime(0.38, t+1.0); g1.gain.exponentialRampToValueAtTime(0.001, t+1.55);
        osc1.connect(dist); dist.connect(g1); g1.connect(ctx.destination); osc1.start(t); osc1.stop(t+1.6);
        // Noise roar
        const rLen = Math.floor(ctx.sampleRate*2.0);
        const rBuf = ctx.createBuffer(1, rLen, ctx.sampleRate);
        const rd = rBuf.getChannelData(0);
        for (let i = 0; i < rLen; i++) rd[i] = Math.random()*2-1;
        const rSrc = ctx.createBufferSource(); rSrc.buffer = rBuf;
        const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
        lp.frequency.setValueAtTime(180, t); lp.frequency.exponentialRampToValueAtTime(4000, t+1.0);
        const rg = ctx.createGain(); rg.gain.setValueAtTime(0, t); rg.gain.linearRampToValueAtTime(0.42, t+0.1); rg.gain.setValueAtTime(0.42, t+0.9); rg.gain.exponentialRampToValueAtTime(0.001, t+2.0);
        rSrc.connect(lp); lp.connect(rg); rg.connect(ctx.destination); rSrc.start(t);
        // Deep bass thud
        const bass = ctx.createOscillator(); bass.type = 'sine';
        bass.frequency.setValueAtTime(85, t); bass.frequency.exponentialRampToValueAtTime(16, t+0.65);
        const bg = ctx.createGain(); bg.gain.setValueAtTime(1.0, t); bg.gain.exponentialRampToValueAtTime(0.001, t+0.65);
        bass.connect(bg); bg.connect(ctx.destination); bass.start(t); bass.stop(t+0.7);
        // High sizzle tail
        const siz = ctx.createOscillator(); siz.type = 'sine';
        siz.frequency.setValueAtTime(3500, t+0.25); siz.frequency.exponentialRampToValueAtTime(700, t+1.3);
        const sg = ctx.createGain(); sg.gain.setValueAtTime(0, t+0.25); sg.gain.linearRampToValueAtTime(0.13, t+0.35); sg.gain.exponentialRampToValueAtTime(0.001, t+1.3);
        siz.connect(sg); sg.connect(ctx.destination); siz.start(t+0.25); siz.stop(t+1.3);
      } catch(e) {}
    }

    // Firework crack: noise burst + tonal pop + optional bass for big bursts
    function playFireworkPop(vol) {
      try {
        vol = vol || 0.42;
        const ctx = getAudio(); const t = ctx.currentTime;
        // Crack
        const cLen = Math.floor(ctx.sampleRate*0.18);
        const cBuf = ctx.createBuffer(1, cLen, ctx.sampleRate);
        const cd = cBuf.getChannelData(0);
        for (let i = 0; i < cLen; i++) cd[i] = (Math.random()*2-1)*Math.exp(-i/(cLen*0.1));
        const cSrc = ctx.createBufferSource(); cSrc.buffer = cBuf;
        const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1800+Math.random()*2200;
        const cg = ctx.createGain(); cg.gain.setValueAtTime(vol, t); cg.gain.exponentialRampToValueAtTime(0.001, t+0.18);
        cSrc.connect(hp); hp.connect(cg); cg.connect(ctx.destination); cSrc.start(t);
        // Tonal pop
        const osc = ctx.createOscillator(); osc.type = 'sine';
        osc.frequency.setValueAtTime(550+Math.random()*700, t); osc.frequency.exponentialRampToValueAtTime(70+Math.random()*100, t+0.2);
        const og = ctx.createGain(); og.gain.setValueAtTime(vol*0.38, t); og.gain.exponentialRampToValueAtTime(0.001, t+0.2);
        osc.connect(og); og.connect(ctx.destination); osc.start(t); osc.stop(t+0.22);
        // Bass thud for big bursts
        if (vol > 0.5) {
          const sub = ctx.createOscillator(); sub.type = 'sine';
          sub.frequency.setValueAtTime(65, t); sub.frequency.exponentialRampToValueAtTime(18, t+0.28);
          const sg = ctx.createGain(); sg.gain.setValueAtTime(vol*0.65, t); sg.gain.exponentialRampToValueAtTime(0.001, t+0.28);
          sub.connect(sg); sg.connect(ctx.destination); sub.start(t); sub.stop(t+0.3);
        }
      } catch(e) {}
    }

    // Crowd applause — filtered noise + LFO clap rhythm, multiple voices
    function playApplause(duration) {
      try {
        const ctx = getAudio(); const t = ctx.currentTime;

        // Shared noise buffer for all voices
        const bufLen = Math.floor(ctx.sampleRate * (duration + 0.5));
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const bd = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) bd[i] = Math.random() * 2 - 1;

        const numVoices = 10;
        for (let v = 0; v < numVoices; v++) {
          const src = ctx.createBufferSource(); src.buffer = buf;

          // Each voice has a different bandpass center (spread of hand sizes / distances)
          const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
          bp.frequency.value = 900 + Math.random() * 3200;
          bp.Q.value = 0.4 + Math.random() * 1.8;

          // LFO creates the rhythmic clapping flutter
          const lfo = ctx.createOscillator(); lfo.type = 'sine';
          lfo.frequency.value = 2.8 + Math.random() * 3.5; // 2.8–6.3 Hz
          const lfoDepth = ctx.createGain(); lfoDepth.gain.value = 0.38;
          lfo.connect(lfoDepth);

          // Center gain (LFO oscillates around this value)
          const center = ctx.createGain(); center.gain.value = 0.55;
          lfoDepth.connect(center.gain); // AudioParam destination

          // Master envelope: build up → sustain → fade out
          const env = ctx.createGain();
          const vol = 0.055 + Math.random() * 0.04;
          const startOffset = Math.random() * 0.15;
          env.gain.setValueAtTime(0, t + startOffset);
          env.gain.linearRampToValueAtTime(vol, t + startOffset + 1.2);
          env.gain.setValueAtTime(vol, t + duration - 1.8);
          env.gain.exponentialRampToValueAtTime(0.001, t + duration);

          src.connect(bp); bp.connect(center); center.connect(env); env.connect(ctx.destination);
          lfo.start(t + startOffset); src.start(t + startOffset);
          lfo.stop(t + duration + 0.1); src.stop(t + duration + 0.1);
        }

        // Crowd cheer undertone — low bandpassed noise sweep (the "yayyy" layer)
        const cheerLen = Math.floor(ctx.sampleRate * duration);
        const cheerBuf = ctx.createBuffer(1, cheerLen, ctx.sampleRate);
        const cd = cheerBuf.getChannelData(0);
        for (let i = 0; i < cheerLen; i++) cd[i] = Math.random() * 2 - 1;
        const cheer = ctx.createBufferSource(); cheer.buffer = cheerBuf;
        const cbp = ctx.createBiquadFilter(); cbp.type = 'bandpass';
        cbp.frequency.setValueAtTime(400, t); cbp.frequency.linearRampToValueAtTime(900, t + 1.5); cbp.frequency.setValueAtTime(700, t + duration);
        cbp.Q.value = 1.5;
        const cg = ctx.createGain();
        cg.gain.setValueAtTime(0, t); cg.gain.linearRampToValueAtTime(0.07, t + 1.0);
        cg.gain.setValueAtTime(0.07, t + duration - 2.0); cg.gain.exponentialRampToValueAtTime(0.001, t + duration);
        cheer.connect(cbp); cbp.connect(cg); cg.connect(ctx.destination); cheer.start(t);
      } catch(e) {}
    }

    // Short electronic thud when launch button is pressed
    function playButtonPress() {
      try {
        const ctx = getAudio(); const t = ctx.currentTime;
        const o1 = ctx.createOscillator(); o1.type = 'sine';
        o1.frequency.setValueAtTime(220, t); o1.frequency.exponentialRampToValueAtTime(60, t+0.12);
        const g1 = ctx.createGain(); g1.gain.setValueAtTime(0.55, t); g1.gain.exponentialRampToValueAtTime(0.001, t+0.13);
        o1.connect(g1); g1.connect(ctx.destination); o1.start(t); o1.stop(t+0.15);
        const o2 = ctx.createOscillator(); o2.type = 'square';
        o2.frequency.setValueAtTime(880, t); o2.frequency.linearRampToValueAtTime(1200, t+0.07);
        const g2 = ctx.createGain(); g2.gain.setValueAtTime(0, t); g2.gain.linearRampToValueAtTime(0.28, t+0.01); g2.gain.exponentialRampToValueAtTime(0.001, t+0.14);
        o2.connect(g2); g2.connect(ctx.destination); o2.start(t); o2.stop(t+0.15);
      } catch(e) {}
    }

    // ── STARS ───────────────────────────────────────────────────────────
    (function buildStars() {
      const svg = document.getElementById('starfield');
      const ns = 'http://www.w3.org/2000/svg';
      const frag = document.createDocumentFragment();
      for (let i = 0; i < 300; i++) {
        const c = document.createElementNS(ns, 'circle');
        const big = Math.random() > 0.97;
        const med = !big && Math.random() > 0.85;
        c.setAttribute('cx', Math.random() * 1920);
        c.setAttribute('cy', Math.random() * 1080);
        c.setAttribute('r', big ? 2.2 : med ? 1.4 : 0.8);
        c.setAttribute('fill', 'white');
        c.setAttribute('opacity', (0.25 + Math.random() * 0.75).toFixed(2));
        if (Math.random() > 0.65) {
          const dur = (2 + Math.random() * 4).toFixed(1);
          const delay = -(Math.random() * 5).toFixed(1);
          c.style.animation = `pulseOpacity ${dur}s ${delay}s ease-in-out infinite`;
        }
        frag.appendChild(c);
      }
      svg.appendChild(frag);
    })();

    // ── HUD CLOCK ───────────────────────────────────────────────────────
    function tickClock() {
      const t = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('hud-time').textContent =
        `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
    }
    tickClock();
    setInterval(tickClock, 1000);

    // ── COVER ───────────────────────────────────────────────────────────
    const cover      = document.getElementById('cover');
    const btn        = document.getElementById('launch-btn');
    const bz         = document.getElementById('button-zone');
    const statusBar  = document.getElementById('status-bar');
    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const hudStatus  = document.getElementById('hud-status');

    function openCover() {
      playCoverOpen();
      cover.classList.add('open');
      btn.disabled = false;
      btn.classList.add('armed');
      bz.classList.add('armed');
      statusBar.classList.add('armed');
      statusDot.classList.add('on');
      statusText.textContent = '⚡  SYSTEM ARMED — PRESS LAUNCH TO BEGIN SEQUENCE';
      hudStatus.textContent = 'ARMED';
    }

    cover.addEventListener('click', openCover);
    cover.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openCover(); });

    // ── COUNTDOWN ───────────────────────────────────────────────────────
    const overlay  = document.getElementById('countdown-overlay');
    const content  = document.getElementById('countdown-content');
    const fwCanvas = document.getElementById('fw-canvas');

    const numColors = { 5: '#00e5ff', 4: '#39ff14', 3: '#ffd700', 2: '#ff8c00', 1: '#ff2222' };

    let timers = [];
    function later(fn, ms) { const id = setTimeout(fn, ms); timers.push(id); }

    function showNumber(n) {
      content.innerHTML = '';
      const el = document.createElement('div');
      el.className = 'countdown-num';
      el.textContent = n;
      el.style.color = numColors[n] || '#fff';
      el.style.textShadow = `0 0 60px ${numColors[n]}cc, 0 0 120px ${numColors[n]}66`;
      content.appendChild(el);
    }

    function showIgnition() {
      content.innerHTML = '';
      const el = document.createElement('div');
      el.className = 'ignition-text';
      el.textContent = 'IGNITION!';
      content.appendChild(el);
    }

    function startCountdown() {
      playButtonPress();
      btn.disabled = true;
      btn.removeEventListener('click', startCountdown);
      overlay.classList.add('visible');
      statusText.textContent = 'LAUNCH SEQUENCE INITIATED';

      let count = 5;
      showNumber(count);
      playBeep(count);

      const step = () => {
        count--;
        if (count === 0) {
          later(() => {
            playIgnition();
            showIgnition();
            later(() => {
              overlay.classList.remove('visible');
              fwCanvas.classList.add('visible');
              fwCanvas.width = window.innerWidth;
              fwCanvas.height = window.innerHeight;
              requestAnimationFrame(() => startFireworks());
            }, 1350);
          }, 950);
        } else {
          later(() => {
            showNumber(count);
            playBeep(count);
            step();
          }, 1000);
        }
      };

      later(step, 1000);
    }

    btn.addEventListener('click', startCountdown);

    // ── FIREWORKS ───────────────────────────────────────────────────────
    const FW_COLORS = [
      '#ff3333', '#ff8800', '#ffdd00', '#33ff88',
      '#00ddff', '#ff33dd', '#ffffff', '#ffaa33',
      '#66aaff', '#ff7744', '#aaff88', '#ff88bb'
    ];

    function startFireworks() {
      const canvas = fwCanvas;
      const ctx = canvas.getContext('2d');

      // Full opaque first frame
      ctx.fillStyle = 'rgb(3, 6, 9)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      let particles = [];

      function Spark(x, y, vx, vy, color, sz) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.color = color;
        this.sz = sz;
        this.alpha = 1;
        this.decay = 0.007 + Math.random() * 0.014;
        this.trail = [];
      }

      Spark.prototype.tick = function() {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 12) this.trail.shift();
        this.vy += 0.055;
        this.vx *= 0.984;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
      };

      Spark.prototype.draw = function(ctx) {
        const n = this.trail.length;
        for (let i = 0; i < n; i++) {
          const f = i / n;
          ctx.globalAlpha = f * this.alpha * 0.45;
          ctx.beginPath();
          ctx.arc(this.trail[i].x, this.trail[i].y, this.sz * f * 0.75, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
        ctx.globalAlpha = this.alpha;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 7;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.sz, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      };

      function burst(x, y, scale) {
        scale = scale || 1;
        const ca = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
        const cb = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
        const n = Math.floor((85 + Math.random() * 90) * scale);
        for (let i = 0; i < n; i++) {
          const angle = (i / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
          const spd = (1.5 + Math.random() * 7.5) * scale;
          const c = Math.random() > 0.45 ? ca : cb;
          const sz = Math.random() > 0.82 ? 1.2 : (2 + Math.random() * 2.5);
          particles.push(new Spark(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, c, sz));
        }
        // White flash center
        for (let i = 0; i < 18; i++) {
          const a = Math.random() * Math.PI * 2;
          const s = Math.random() * 1.8;
          particles.push(new Spark(x, y, Math.cos(a) * s, Math.sin(a) * s, '#ffffff', 2.5 + Math.random() * 2));
        }
      }

      const W = canvas.width;
      const H = canvas.height;

      const seq = [
        [0,    W * 0.50, H * 0.30, 1.2],
        [180,  W * 0.30, H * 0.25, 1.0],
        [320,  W * 0.70, H * 0.25, 1.0],
        [560,  W * 0.15, H * 0.42, 0.9],
        [700,  W * 0.85, H * 0.38, 0.9],
        [960,  W * 0.50, H * 0.20, 1.15],
        [1150, W * 0.38, H * 0.33, 0.9],
        [1260, W * 0.63, H * 0.28, 0.9],
        [1500, W * 0.22, H * 0.28, 1.0],
        [1650, W * 0.78, H * 0.28, 1.0],
        [1950, W * 0.50, H * 0.22, 1.35],
        [2100, W * 0.33, H * 0.18, 1.0],
        [2220, W * 0.67, H * 0.18, 1.0],
        [2450, W * 0.18, H * 0.33, 0.9],
        [2560, W * 0.82, H * 0.33, 0.9],
        [2820, W * 0.50, H * 0.28, 1.45],
      ];

      // Applause runs for the full fireworks duration
      playApplause((seq[seq.length - 1][0] + 3200) / 1000);

      seq.forEach(function(entry) {
        later(function() {
          burst(entry[1], entry[2], entry[3]);
          playFireworkPop(0.28 + entry[3] * 0.22);
        }, entry[0]);
      });

      let rafId;
      function frame() {
        ctx.fillStyle = 'rgba(3, 6, 9, 0.17)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(function(p) { return p.alpha > 0.02; });
        particles.forEach(function(p) { p.tick(); p.draw(ctx); });
        rafId = requestAnimationFrame(frame);
      }
      frame();

      const lastDelay = seq[seq.length - 1][0];
      later(function() {
        cancelAnimationFrame(rafId);
        window.location.href = REDIRECT;
      }, lastDelay + 3500);
    }
  </script>
